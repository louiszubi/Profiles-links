 <!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Social links profile</title>

  <style>
  
  body {
    background-color: hsl(0, 0%, 8%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  
  .card {
    background-color:  hsl(0, 0%, 12%);
    width: 384px;
    margin: auto;
    padding: 24px;
    border-radius: 16px;
    text-align: center;
  }
  
  nav a {
    background-color: hsl(0, 0%, 20%);
    color: hsl(0, 0%, 100%);
    display: block;
    padding: 12px;
    border-radius: 8px;
    margin: 8px;
  }
  
  nav a:hover {
    background-color: hsl(75, 94%, 57%);
  }
  
    .attribution { font-size: 11px; text-align: center; 
      background-color: hsl(0, 0%, 100%);
    }
    
    .attribution a { color: #0542CF;
    }
    
    .avatar {
      border-radius: 50%;
    }
    
    .location {
      color: hsl(75, 94%, 57%);
    }
    
    .title {
      color: hsl(0, 0%, 100%);
    }
    
    .quote {
      color: hsl(0, 0%, 100%);
    }
  </style>
  
</head>
<body>
  
  <section class="card">
    <img src="pm_1774100037490_cmp.jpg" alt="My Profile Picture" height="150" width="150" class="avatar">

  <div class="attribution">
